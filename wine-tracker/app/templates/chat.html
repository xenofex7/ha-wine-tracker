<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css">
<link rel="stylesheet" href="{{ ingress }}/static/style.css">
<script>
(function(){var n=localStorage.getItem('wine-theme-name')||'homeassistant';if(n&&n!=='classic')document.documentElement.setAttribute('data-theme',n);var s=localStorage.getItem('wine-theme')||'system';var e=s==='system'?(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'):s;if(e==='light')document.documentElement.classList.add('light');})();
</script>
<title>{{ t.chat_title }} – Wine Tracker</title>
</head>
<body class="chat-page">

<header>
  <a class="nav-brand" href="{{ ingress }}/" style="display:flex"><img src="{{ ingress }}/static/logo.png" alt="Wine Tracker" class="nav-logo"></a>
  <nav class="nav-links">
    <a class="nav-link" href="{{ ingress }}/">{{ t.nav_cellar }}</a>
    <a class="nav-link" href="{{ ingress }}/timeline">{{ t.timeline }}</a>
    <a class="nav-link" href="{{ ingress }}/stats">{{ t.stats_title }}</a>

  </nav>
  <div class="header-spacer"></div>
  <button class="theme-toggle" onclick="openModal('settingsModal')" title="{{ t.settings_title }}"><i class="mdi mdi-cog"></i></button>
</header>

<!-- Full page chat content -->
<div class="chat-fullpage">
  <div class="chat-fullpage-messages" id="chatMessages">
    <div class="chat-welcome">
      <img src="{{ ingress }}/static/logo.png" alt="Wine Tracker" style="width:48px;height:48px;opacity:.7">
      <p>{{ t.chat_welcome }}</p>
    </div>
  </div>
  <div class="chat-fullpage-input">
    <input type="text" id="chatInput" placeholder="{{ t.chat_placeholder }}"
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}">
    <button class="chat-send" id="chatSendBtn" onclick="sendChatMessage()" title="{{ t.chat_send }}">
      <i class="mdi mdi-send"></i>
    </button>
  </div>
</div>

<!-- Bottom tab bar for mobile -->
<nav class="bottom-tab-bar">
  <a href="{{ ingress }}/" class="tab-item">
    <i class="mdi mdi-bottle-wine"></i>
    <span>{{ t.nav_cellar }}</span>
  </a>
  <a href="{{ ingress }}/chat" class="tab-item active">
    <i class="mdi mdi-chat"></i>
    <span>{{ t.chat_title }}</span>
  </a>
  <a href="{{ ingress }}/timeline" class="tab-item">
    <i class="mdi mdi-timeline-text-outline"></i>
    <span>{{ t.timeline }}</span>
  </a>
  <a href="{{ ingress }}/stats" class="tab-item">
    <i class="mdi mdi-chart-bar"></i>
    <span>{{ t.stats_title }}</span>
  </a>
</nav>

<!-- ═══════════════ WINE VIEW MODAL ═══════════════ -->
{% include '_wine_view_modal.html' %}

{% include '_settings_modal.html' %}

<!-- ═══════════════ LIGHTBOX ═══════════════ -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt="{{ t.lightbox_alt }}">
</div>

<script src="{{ ingress }}/static/theme.js"></script>
<script>
var INGRESS = '{{ ingress }}';
var T = {{ t | tojson }};
var CURRENCY = '{{ currency }}';
var AUTH_READONLY = {{ auth_readonly | tojson }};

function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'settingsModal') { updateThemeSegmented(); updateThemeDropdown(); }
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === el) closeModal(el.id);
  });
});

// ESC closes modals & lightbox
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeLightbox();
    document.querySelectorAll('.modal-overlay.open').forEach(function(el) {
      el.classList.remove('open');
    });
  }
});

// ── View Modal functions ──────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

var BOTTLE_FORMATS = {
  0.1875: 'Piccolo (0.1875 l)', 0.375: 'Demi (0.375 l)', 0.75: 'Standard (0.75 l)',
  1.5: 'Magnum (1.5 l)', 3: 'Double Magnum (3 l)', 4.5: 'Jéroboam (4.5 l)',
  6: 'Impérial (6 l)', 9: 'Salmanazar (9 l)', 12: 'Balthazar (12 l)',
  15: 'Nebukadnezar (15 l)'
};

function viewRow(icon, label, value) {
  return '<div class="view-row"><i class="mdi ' + icon + '"></i>'
       + '<span class="view-label">' + escapeHtml(label) + '</span>'
       + '<span class="view-value">' + escapeHtml(String(value)) + '</span></div>';
}

function openViewModal(id, wine) {
  var w = wine || {};
  window._viewWineId = id;
  window._viewWineData = w;

  document.getElementById('viewModalTitle').textContent = T.modal_view_title || 'Wine details';

  var html = '';

  if (w.image) {
    html += '<div class="view-photo-panel" onclick="openLightbox(\'' + INGRESS + '/uploads/' + encodeURIComponent(w.image) + '\')">'
          + '<img src="' + INGRESS + '/uploads/' + encodeURIComponent(w.image) + '" alt="' + escapeHtml(w.name) + '">'
          + '</div>';
  }

  html += '<div class="view-fields-panel">';
  html += '<div class="view-name">' + escapeHtml(w.name) + '</div>';

  if (w.type) {
    var typeKey = 'wine_type_' + w.type;
    var typeLabel = T[typeKey] || w.type;
    html += '<span class="view-type-badge ribbon-' + escapeHtml(w.type) + '">' + escapeHtml(typeLabel) + '</span>';
  }

  var meta = [];
  if (w.year) meta.push('<span>' + w.year + '</span>');
  if (w.region) meta.push('<span>' + escapeHtml(w.region) + '</span>');
  if (meta.length) html += '<div class="view-meta">' + meta.join('') + '</div>';

  if (w.rating && w.rating > 0) {
    var stars = '';
    for (var i = 0; i < 5; i++) stars += '<i class="mdi ' + (i < w.rating ? 'mdi-star' : 'mdi-star-outline') + '"></i>';
    html += '<div class="view-stars">' + stars + '</div>';
  }

  var details = '';
  details += viewRow('mdi-bottle-wine', T.label_quantity || 'Quantity', w.quantity);
  if (w.bottle_format && parseFloat(w.bottle_format) !== 0.75) {
    var fmt = BOTTLE_FORMATS[parseFloat(w.bottle_format)] || w.bottle_format + ' l';
    details += viewRow('mdi-ruler', T.label_bottle_format || 'Format', fmt);
  }
  if (w.grape) details += viewRow('mdi-fruit-grapes', T.label_grape || 'Grape', w.grape);
  if (w.purchased_at) details += viewRow('mdi-cart', T.label_purchased_at || 'Purchased at', w.purchased_at);
  if (w.price) {
    details += viewRow('mdi-cash', T.label_price || 'Price', CURRENCY + ' ' + Number(w.price).toFixed(2));
  }
  if (w.drink_from || w.drink_until) {
    var window_str = (w.drink_from || '?') + ' – ' + (w.drink_until || '?');
    details += viewRow('mdi-calendar-range', T.view_drink_window || 'Drink window', window_str);
  }
  if (w.location) details += viewRow('mdi-map-marker', T.label_location || 'Location', w.location);
  if (w.vivino_id) {
    details += '<div class="view-row"><i class="mdi mdi-open-in-new"></i>'
             + '<span class="view-label">Vivino</span>'
             + '<a href="https://www.vivino.com/w/' + w.vivino_id + '" target="_blank" rel="noopener" class="view-vivino-link view-value">vivino.com</a></div>';
  }
  if (details) html += '<div class="view-details">' + details + '</div>';

  if (w.notes) html += '<div class="view-notes">' + escapeHtml(w.notes) + '</div>';

  html += '<div class="view-actions">';
  if (!AUTH_READONLY) {
    html += '<button class="btn-submit" onclick="editFromView()">' + (T.btn_edit || 'Edit') + '</button>';
  }
  html += '</div>';
  html += '</div>';

  document.getElementById('viewModalBody').innerHTML = html;
  openModal('viewModal');
}

function editFromView() {
  closeModal('viewModal');
  window.open(INGRESS + '/?edit=' + window._viewWineId, '_blank');
}
</script>

<!-- Chat JS -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    marked.setOptions({breaks: true, gfm: true});
    return marked.parse(text);
  }
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

var _chatHistory = JSON.parse(sessionStorage.getItem('chatHistory') || '[]');
var _chatSending = false;

// Restore previous messages on page load
(function restoreChatSession() {
  if (_chatHistory.length === 0) return;
  var container = document.getElementById('chatMessages');
  var welcome = container.querySelector('.chat-welcome');
  if (welcome) welcome.remove();
  _chatHistory.forEach(function(msg) {
    var div = document.createElement('div');
    div.className = 'chat-msg chat-msg-' + msg.role;
    var bubble = document.createElement('div');
    bubble.className = 'chat-bubble';
    if (msg.role === 'assistant') {
      bubble.innerHTML = renderMarkdown(msg.content);
    } else {
      bubble.textContent = msg.content;
    }
    div.appendChild(bubble);
    container.appendChild(div);
  });
  scrollChatBottom();
})();

function scrollChatBottom() {
  var el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}

function appendChatMessage(role, text) {
  var container = document.getElementById('chatMessages');
  var welcome = container.querySelector('.chat-welcome');
  if (welcome) welcome.remove();
  var div = document.createElement('div');
  div.className = 'chat-msg chat-msg-' + role;
  var bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  if (role === 'assistant') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  container.appendChild(div);
  scrollChatBottom();
  return bubble;
}

function appendChatLoading() {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'chat-msg chat-msg-assistant';
  div.id = 'chatLoading';
  var bubble = document.createElement('div');
  bubble.className = 'chat-bubble chat-bubble-loading';
  bubble.innerHTML = '<span class="chat-dots"><span>.</span><span>.</span><span>.</span></span>';
  div.appendChild(bubble);
  container.appendChild(div);
  scrollChatBottom();
}

function removeChatLoading() {
  var el = document.getElementById('chatLoading');
  if (el) el.remove();
}

function sendChatMessage() {
  if (_chatSending) return;
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  _chatSending = true;
  document.getElementById('chatSendBtn').disabled = true;
  appendChatMessage('user', text);
  appendChatLoading();
  fetch(INGRESS + '/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, history: _chatHistory})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    removeChatLoading();
    if (data.ok) {
      appendChatMessage('assistant', data.response);
      _chatHistory.push({role: 'user', content: text});
      _chatHistory.push({role: 'assistant', content: data.response});
      if (_chatHistory.length > 20) _chatHistory = _chatHistory.slice(-20);
      sessionStorage.setItem('chatHistory', JSON.stringify(_chatHistory));
    } else {
      appendChatMessage('assistant', T.chat_error || 'Error getting response. Please try again.');
    }
  })
  .catch(function() {
    removeChatLoading();
    appendChatMessage('assistant', T.chat_error || 'Error getting response. Please try again.');
  })
  .finally(function() {
    _chatSending = false;
    document.getElementById('chatSendBtn').disabled = false;
    document.getElementById('chatInput').focus();
  });
}

// Handle wine: links in chat messages — open view modal in-place
document.querySelector('.chat-fullpage').addEventListener('click', function(e) {
  var link = e.target.closest('a[href^="wine:"]');
  if (!link) return;
  e.preventDefault();
  var wineId = link.getAttribute('href').replace('wine:', '');
  fetch(INGRESS + '/api/wine/' + encodeURIComponent(wineId))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) openViewModal(data.wine.id, data.wine);
    });
});

// Auto-focus input on load
document.getElementById('chatInput').focus();
</script>
</body>
</html>
